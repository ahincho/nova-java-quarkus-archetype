# ===== HTTP =====
quarkus.http.port=8080
quarkus.http.test-port=8081

# ===== Nova Platform notifications =====
# The nova-notifications-quarkus-extension (declared in nova-java-quarkus-parent)
# reads these properties and wires the NotificationFacade bean. The
# enabled=false switch turns every facade.send() into a no-op returning
# ErrorCode.DISABLED, useful for local smoke tests without provider keys.
nova.notifications.enabled=true
nova.notifications.email.provider=sendgrid
nova.notifications.email.api-key=${SENDGRID_API_KEY:test-api-key-local}
nova.notifications.email.default-sender=no-reply@example.com
nova.notifications.resilience.max-attempts=1

# ===== OpenAPI / Swagger UI =====
quarkus.smallrye-openapi.path=/openapi
quarkus.swagger-ui.always-include=true
quarkus.swagger-ui.path=/q/swagger-ui

# ===== Logging =====
quarkus.log.level=INFO
quarkus.log.category."${package}.boot".level=DEBUG